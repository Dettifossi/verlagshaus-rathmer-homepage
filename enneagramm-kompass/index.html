    <script>
      if ("serviceWorker" in navigator) {
        // Reload wenn neuer SW aktiviert wird (iOS-kompatibel via postMessage)
        navigator.serviceWorker.addEventListener('message', e => {
          if (e.data && e.data.type === 'SW_UPDATED') window.location.reload();
        });
        // Fallback: controllerchange (Chrome/Android)
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
        // SW registrieren und sofort auf Update prüfen
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
          .then(reg => reg.update());
      }
